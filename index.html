<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <title>Do you forgive me ?</title>
</head>

<body>

<div class="container question-container">

  <video class="local-gif" src="Reply me love.mp4" autoplay muted loop></video>

  <h2 class="sorry">Sorry Piddi 😣</h2>
  <h2 class="question">Do you Forgive me?</h2>

  <div class="button-container">
    <button class="yes-btn btn js-yes-btn">Yes</button>
    <button class="no-btn btn js-no-btn">No</button>
  </div>

  <div class="msg">
    <h3>Msg From Ally:</h3>
    <p class="msg-text">
      Hey Piddi, sorry—I was just joking earlier. But honestly, you sing so beautifully… your voice is dangerously attractive. It’s kind of hard not to get hooked on it.Piddi You really are like an angel… such a cutiee pie
    </p>
  </div>

</div>

<div class="container result-container">
  <video class="gif-result" src="Love me.mp4" autoplay loop></video>
  <h2>I knew it😍!</h2>
</div>

<!-- loader -->
<div class="cssload-main">
  <div class="cssload-heart">
    <span class="cssload-heartL"></span>
    <span class="cssload-heartR"></span>
    <span class="cssload-square"></span>
  </div>
  <div class="cssload-shadow"></div>
</div>

<script src="script.js"></script>

</body>
</html>
